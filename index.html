<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Driver Daily Report ATR</title>

<style>
body { font-family: Arial, sans-serif; margin: 20px; }
label { font-weight: bold; margin-top: 10px; display: block; }

input[type="text"],
input[type="time"],
select,
textarea {
    margin-top:4px;
    margin-bottom:10px;
    padding:6px;
    width:220px;
    box-sizing:border-box;
}

textarea {
    width:100%;
    height:40px;
    resize:vertical;
}

button {
    padding:8px 15px;
    margin-top:10px;
    cursor:pointer;
}

table {
    width:100%;
    border-collapse: collapse;
    margin-top:20px;
    font-size:14px;
}

th, td {
    border:1px solid #888;
    padding:6px 8px;
    text-align:center;
}

th { background:#eee; }

td[contenteditable="true"]:focus{
    outline:2px solid #6ca0dc;
    background:#f0f8ff;
}

.short{width:120px;}

#alertExcel{
    margin-top:15px;
    background:#f8d7da;
    border:1px solid #f5c6cb;
    color:#721c24;
    padding:10px;
    font-weight:bold;
}
</style>

</head>

<body>

<h2>Driver Daily Report ATR</h2>

<label>Vehicle:</label>
<input type="text" id="vehicle" class="short">

<label>Run:</label>
<input type="text" id="run" class="short">

<hr>

<label>Specification:</label>
<select id="specification">
<option value="">Select specification</option>
<option>Collection Only</option>
<option>Delivery Only</option>
<option>Collection and Delivery</option>
</select>

<label>Location:</label>
<select id="location">
<option value="">Select</option>
<option>AC</option>
<option>ASC</option>
<option>BA WC</option>
<option>BA WC 2nd</option>
<option>Ba XPS</option>
<option>DAI</option>
<option>Dnata CP</option>
<option>Dnata CX</option>
<option>Dnata U1</option>
<option>Dnata U2</option>
<option>Dnata U3</option>
<option>Dnata VS/Delta</option>
<option>HCH</option>
<option>JL</option>
<option>LG</option>
<option>LANDMARK GLOBAL</option>
<option>MW</option>
<option>Scylla Rd</option>
<option>Scylla U1</option>
<option>WFS 549</option>
<option>WFS 550</option>
<option>ECMS</option>
<option>Swissport</option>
<option>BREAK</option>
<option value="manual">Other (Manual)</option>
</select>

<input type="text" id="manualLocation" placeholder="Manual location" style="display:none">

<label>Arrival:</label>
<input type="time" id="arrival">

<label>Booking:</label>
<input type="time" id="booking">

<label>Loading:</label>
<input type="time" id="loading">

<label>Departure:</label>
<input type="time" id="departure">

<label>Comment:</label>
<textarea id="comment"></textarea>

<button onclick="addEntry()">Add Location</button>

<hr>

<label>Select Date:</label>
<input type="date" id="filterDate" class="short">

<div id="alertExcel">
⚠ After adding locations click → Send to Google Sheet
</div>

<button id="sendExcelBtn">Send to Google Sheet</button>

<table>
<thead>
<tr>
<th>Date</th>
<th>Vehicle</th>
<th>Run</th>
<th>Location</th>
<th>Arrival</th>
<th>Booking</th>
<th>Loading</th>
<th>Departure</th>
<th>Specification</th>
<th>Comment</th>
</tr>
</thead>

<tbody id="reportTable"></tbody>
</table>

<script>

const GOOGLE_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbylgggp-wjd_uMWz5997_7JAEHCUt-0pZoEZLTk_nM/exec";

let dailyData = {};

document.getElementById("location").addEventListener("change",function(){
    document.getElementById("manualLocation").style.display =
        this.value==="manual" ? "block":"none";
});

function addEntry(){

    let vehicle = document.getElementById("vehicle").value.trim();
    let run = document.getElementById("run").value.trim();
    let specification = document.getElementById("specification").value;

    let locationSelect = document.getElementById("location").value;
    let manualLocation = document.getElementById("manualLocation").value.trim();

    let location = locationSelect==="manual" ? manualLocation : locationSelect;

    if(!vehicle || !run || !location || !specification){
        alert("Complete required fields");
        return;
    }

    let date = new Date().toISOString().split("T")[0];

    if(!dailyData[date]) dailyData[date]=[];
    
    dailyData[date].push({
        date,
        vehicle,
        run,
        location,
        arrival:document.getElementById("arrival").value,
        booking:document.getElementById("booking").value,
        loading:document.getElementById("loading").value,
        departure:document.getElementById("departure").value,
        specification,
        comment:document.getElementById("comment").value
    });

    renderTable();
}

function renderTable(){

    let tbody=document.getElementById("reportTable");
    tbody.innerHTML="";

    let date=document.getElementById("filterDate").value;

    if(!dailyData[date]) return;

    dailyData[date].forEach(entry=>{

        let row=tbody.insertRow();

        row.insertCell().textContent=entry.date;
        row.insertCell().textContent=entry.vehicle;
        row.insertCell().textContent=entry.run;
        row.insertCell().textContent=entry.location;
        row.insertCell().textContent=entry.arrival;
        row.insertCell().textContent=entry.booking;
        row.insertCell().textContent=entry.loading;
        row.insertCell().textContent=entry.departure;
        row.insertCell().textContent=entry.specification;
        row.insertCell().textContent=entry.comment;
    });
}

document.getElementById("sendExcelBtn").addEventListener("click",function(){

    let date=document.getElementById("filterDate").value;

    if(!dailyData[date]){
        alert("No data");
        return;
    }

    fetch(GOOGLE_SCRIPT_URL,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({entries:dailyData[date]})
    })
    .then(r=>r.text())
    .then(resp=>{
        alert("Server response: "+resp);
    })
    .catch(()=>alert("Send failed"));
});

window.onload=function(){
    document.getElementById("filterDate").value =
        new Date().toISOString().split('T')[0];
};

</script>

</body>
</html>
